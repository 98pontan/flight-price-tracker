name: Forgejo Kubernetes Runner Demo

on:
  push:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Check out repository source code
        uses: https://github.com/actions/checkout@v4

      - name: Install Docker CLI
        run: |
          echo "Installing Docker CLI..."
          curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.0.3.tgz | tar -xz --strip-components=1 -C /usr/local/bin docker/docker
          docker --version

      - name: Log in to Forgejo Container Registry
        uses: https://github.com/docker/login-action@v3
        with:
          # Using 'github' contexts is explicitly mapped in Forgejo
          # to maximize compatibility with marketplace actions.
          registry: ${{ github.server_url }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: https://github.com/docker/metadata-action@v5
        with:
          images: ${{ github.server_url }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push Docker image
        uses: https://github.com/docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
